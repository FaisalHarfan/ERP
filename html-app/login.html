<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tana Subur Nusantara - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <script src="db.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1b91f0 0%, #6366f1 50%, #1b91f0 100%);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(27, 145, 240, 0.15);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1b91f0, #6366f1);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(27, 145, 240, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .dot-pattern {
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>

<body class="h-screen overflow-hidden gradient-bg flex items-center justify-center p-4">

    <!-- Dot pattern overlay -->
    <div class="absolute inset-0 dot-pattern pointer-events-none"></div>

    <!-- Floating blobs -->
    <div class="absolute top-10 left-10 w-72 h-72 bg-white/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-indigo-300/20 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Card -->
    <div class="glass rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden relative z-10">

        <!-- Header branding -->
        <div class="p-8 pb-6 text-center">
            <div class="flex items-center justify-center gap-2 mb-2">
                <img src="assets/logo.png" alt="UnityERP" class="w-10 h-10 rounded-xl shadow-md object-contain"
                    onerror="this.style.display='none'">
                <span class="text-2xl font-black text-gray-800 tracking-tight">Tana Subur <span
                        class="text-blue-600">Nusantara</span></span>
            </div>
            <p class="text-gray-400 text-sm">Sistem Informasi Manufaktur</p>
        </div>

        <!-- Login Form -->
        <div class="px-8 pb-8">
            <div class="space-y-4">
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Email</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i
                                class="fas fa-envelope text-sm"></i></span>
                        <input id="login_email" type="email" placeholder="email@domain.com"
                            class="input-field w-full border border-gray-200 rounded-xl pl-10 pr-4 py-3 text-sm bg-white focus:outline-none focus:border-blue-400 transition-all"
                            onkeydown="if(event.key==='Enter') doLogin()">
                    </div>
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><i
                                class="fas fa-lock text-sm"></i></span>
                        <input id="login_password" type="password" placeholder="••••••••"
                            class="input-field w-full border border-gray-200 rounded-xl pl-10 pr-10 py-3 text-sm bg-white focus:outline-none focus:border-blue-400 transition-all"
                            onkeydown="if(event.key==='Enter') doLogin()">
                        <button onclick="togglePw('login_password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div id="login_error"
                    class="hidden text-red-500 text-xs bg-red-50 border border-red-100 rounded-lg px-3 py-2 flex items-center gap-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="login_error_msg">Email atau password salah.</span>
                </div>

                <button onclick="doLogin()"
                    class="btn-primary w-full text-white py-3 rounded-xl text-sm font-bold shadow-md mt-2">
                    <i class="fas fa-sign-in-alt mr-2"></i>Masuk ke ERP
                </button>
            </div>

            <p class="text-center text-xs text-gray-400 mt-6">
                Belum punya akun? Hubungi <span class="font-semibold text-gray-500">Administrator</span>.
            </p>
            
            <div class="mt-8 pt-6 border-t border-white/20 text-center">
                <p class="text-[10px] font-bold text-white/70 uppercase tracking-[0.2em]">Powered By Unity<span class="text-blue-200">ERP</span></p>
            </div>
        </div>
    </div>

    <script>
        function togglePw(id) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function showError(panelId, msg) {
            const el = document.getElementById(panelId);
            document.getElementById(panelId + '_msg').textContent = msg;
            el.classList.remove('hidden');
        }

        function doLogin() {
            const email = document.getElementById('login_email').value.trim().toLowerCase();
            const password = document.getElementById('login_password').value.trim();

            document.getElementById('login_error').classList.add('hidden');

            if (!email || !password) {
                showError('login_error', 'Isi email dan password terlebih dahulu.');
                return;
            }

            const users = db.read('users');
            // Support both email and legacy username for backward compat
            const user = users.find(u => (u.email === email || u.username === email) && u.password === password);

            if (!user) {
                showError('login_error', 'Email atau password salah.');
                return;
            }
            if (user.status === 'NONAKTIF') {
                showError('login_error', 'Akun Anda telah dinonaktifkan. Hubungi Administrator.');
                return;
            }

            // Save session
            localStorage.setItem('unityerp_session', JSON.stringify({
                userId: user.id,
                email: user.email || user.username,
                fullName: user.fullName,
                avatar: user.avatar || user.fullName.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(),
                roleId: user.roleId,
                loginAt: new Date().toISOString()
            }));

            // Optional: Backup legacy session removal
            localStorage.removeItem('nexerp_session');

            window.location.href = 'index.html';
        }

        // Check if already logged in
        // Support migration for the very first time
        if (!localStorage.getItem('unityerp_session') && localStorage.getItem('nexerp_session')) {
            localStorage.setItem('unityerp_session', localStorage.getItem('nexerp_session'));
            localStorage.removeItem('nexerp_session');
        }

        const existingSession = localStorage.getItem('unityerp_session');
        if (existingSession) {
            try {
                const s = JSON.parse(existingSession);
                if (s.userId) window.location.href = 'index.html';
            } catch (e) { localStorage.removeItem('nexerp_session'); }
        }
    </script>
</body>

</html>
